<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="mns_style.css">
</head>
<body>
    <section class="OnlineStore">
        <div class="NintendoStore">
            <h2 class="SectionHeader">
                Online Store
            </h2>
            <a 
            href="https://www.nintendo.com/us/store/" 
            title="My Nintendo Store">
                <div class="NintendoStoreResponsiveImage">
                    <img 
                    src="Assets/MNS_mobile.png" 
                    alt="My Nintendo Store"
                    class="MyNintendoStoreImageMobile">
                    <img 
                    alt="My Nintendo Store"
                    class="MyNintendoStoreImage" 
                    src="Assets/MNS_DesktopHighRes.png">
                </div>
            </a>
            <div class="OnlineStoreDescription">
                <p class="OnlineStoreDescriptionText">
                    <strong>Shop games, exclusive Nintendo merchandise, and more! Plus, get free shipping on orders $50 and over.                    </strong>
                </p>
                <div>
                    <a 
                    href="https://www.nintendo.com/us/store/" 
                    class="StartShoppingButton">
                    Start shopping
                    </a>
                </div>
            </div>
            
        </div>
    </section>

<!--ADD DIVIDER!-->

    <section class="GamingSystems">
        <div class="GamingSystemsContent">
            <h2 class="SectionHeader">
                Gaming systems
            </h2>
            <a href="https://www.nintendo.com/us/switch/" class="GamingSystemsPicture">
                <div class="">
                    <img 
                    alt="Nintendo Switch family"
                    id="GamingSystemsImg" 
                    src="Assets/Nintendo_Switch_family_wide.jpg">
                </div>
            </a>
            <div class="">
                <p class="">
                    <strong>Find the perfect Nintendo Switch system for you.</strong>
                </p>
            </div>
            <a href="https://www.nintendo.com/us/switch/" class="ExploreGamingSystemsButton">
                Explore now
            </a>
        </div>
    </section>
</body>
</html>
